<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Job Recommendation System</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>AI Job Recommendation System</h1>
      <p>Get job recommendations based on your skills, experience level, and years of experience</p>
    </div>

    <div class="form-card">
      <form id="recommendForm">
        <div class="form-group">
          <label for="skills">Skills</label>
          <input
            type="text"
            id="skills"
            placeholder="Example: python, sql, html, css, javascript"
            required
          />
          <small>Enter skills separated by commas</small>
        </div>

        <div class="form-group">
          <label for="experienceLevel">Experience Level</label>
          <select id="experienceLevel" required>
            <option value="">Select experience level</option>
            <option value="fresher">Fresher</option>
            <option value="entry">Entry</option>
            <option value="mid">Mid</option>
            <option value="experienced">Experienced</option>
            <option value="senior">Senior</option>
          </select>
        </div>

        <div class="form-group">
          <label for="yearsOfExperience">Years of Experience</label>
          <input
            type="number"
            id="yearsOfExperience"
            min="0"
            step="0.1"
            placeholder="Example: 1"
            required
          />
        </div>

        <div class="form-group">
          <label for="topN">Number of Recommendations</label>
          <input
            type="number"
            id="topN"
            min="1"
            max="10"
            value="5"
            required
          />
        </div>

        <button type="submit" class="btn">Get Recommendations</button>
      </form>
    </div>

    <div id="loading" class="loading hidden">
      <p>Fetching recommendations...</p>
    </div>

    <div id="errorBox" class="error-box hidden"></div>

    <div id="resultsSection" class="results-section hidden">
      <h2>Recommended Jobs</h2>
      <div id="resultsContainer" class="results-container"></div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
